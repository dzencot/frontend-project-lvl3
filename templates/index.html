<!doctype html>
<html>

  <head>
    <meta charset="UTF-8">
    <title>RSS Reader</title>
  </head>

  <body>
    <div id="application">
      <div class="spinner" style="display: none;">
        <div class="bg-white opct fixed-top h-100 w-100 d-flex align-items-center justify-content-center">
          <div class="spinner-border text-info p-4" role="status">
            <span class="sr-only">Loading...</span>
          </div>
        </div>
      </div>
      <div class="modal fade" id="modal-post" tabindex="-1" role="dialog" aria-labelledby="infoModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="post-title"></h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">
              <div id="post-description"></div>
              <a id="post-link">Link</a>
            </div>
          </div>
        </div>
      </div>
      <div class="container">
        <div class="alert alert-info w-100">
          Example RSS links:
          <a class="example-link" href="https://ru.hexlet.io/lessons.rss">Hexlet Lessons</a>,
          <a class="example-link" href="https://ru.hexlet.io/blog.rss">Hexlet Blog</a>,
          <a class="example-link" href="http://lorem-rss.herokuapp.com/feed?unit=second&interval=1">Lorem RSS 1 sec</a>,
          <a class="example-link" href="http://lorem-rss.herokuapp.com/feed?unit=minute&interval=1">Lorem RSS 1 min</a>,
          <a class="example-link" href="http://lorem-rss.herokuapp.com/feed?unit=minute&interval=7">Invalid Lorem RSS</a>,
          <a class="example-link" href="http://lorem-rss.herokuapp.com/feed?unit=minute&interval=70">Second Invalid Lorem RSS</a>,
          <a class="example-link" href="http://feeds.bbci.co.uk/news/rss.xml">BBC News</a>
        </div>
        <form id="form" class="jumbotron pb-4 pt-4">
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text" id="basic-addon1">Insert your RSS link</span>
            </div>
            <input name="url" type="text" id="input-rss" class="form-control alert-dark" placeholder="Enter RSS link"
              aria-label="RSS Link" aria-describedby="basic-addon1">
            <div class="input-group-append">
              <button class="btn btn-outline-secondary" id="add-rss" role="button">Get RSS</button>
            </div>
          </div>
        </form>
        <div id="list-rss"></div>
      </div>
    </div>
    <div class="position-fixed" style="bottom: 10px; right: 10px">
      <button class="change-language" data-language="ru">ru</button>
      <button class="change-language" data-language="en">en</button>
    </div>
  </body>

</html>
