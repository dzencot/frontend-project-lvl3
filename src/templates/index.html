<!doctype html>
<html>
  <head>
    <title>Webpack Package</title>
  </head>
  <body>
    <div class="toast fade hide" style="position: absolute; right: 10px" data-delay="2000">
      <div class="toast-header">
        Лента новостей(RSS)
      </div>
      <div class="toast-body">
      </div>
    </div>
    <div class="modal fade" id="modal-post" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-post-label">Modal title</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
    <div class="jumbotron">
      <h1 class="display-4">Лента новостей(RSS)</h1>
      <hr class="my-4">
      <p>Добавить ленту новостей.</p>
      <div class="input-group mb-3">
        <input type="text" class="form-control col-sm-4" placeholder="rss" aria-label="rss">
      </div>
      <a class="btn btn-primary btn-lg" href="#" role="button" id='add-rss'>Добавить</a>
      <div class="pt-5">
        <table class="table table-sm">
          <thead>
            <tr>
              <th scope="col">Название</th>
              <th scope="col">Описание</th>
            </tr>
          </thead>
          <tbody id="feed-list"></tbody>
        </table>
      </div>
      <div class="pt-5">
        <p>Список постов:</p>
        <div id="posts-list"></div>
      </div>
    </div>
  </body>
</html>
